<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 400 285" width="800" height="570">
  <style>
    .solid { fill: #c4956a; stroke: none; }
    .component { fill: #fff; stroke: #666; stroke-width: 0.4; }
    .conduit { fill: #fff; stroke: #c77; stroke-width: 0.3; }
    .mesh-void { fill: #fff; stroke: #bbb; stroke-width: 0.3; }
    .velcro-hole { fill: #fff; stroke: #999; stroke-width: 0.3; }
    .label { font-family: sans-serif; font-size: 6px; fill: #333; text-anchor: middle; }
    .label-small { font-family: sans-serif; font-size: 4px; fill: #666; text-anchor: middle; }
    .label-conduit { font-family: sans-serif; font-size: 4px; fill: #a44; text-anchor: middle; }
    .title { font-family: sans-serif; font-size: 10px; fill: #FFF; font-weight: bold; }
    .frame-dim { font-family: sans-serif; font-size: 3.5px; fill: #864; }
  </style>

  <defs>
    <clipPath id="plate-clip">
      <rect x="0" y="0" width="355.7" height="248.1" rx="7.25" ry="7.25"/>
    </clipPath>
    <!-- Light diagonal hatch overlay for mesh voids -->
    <pattern id="mesh-hatch" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <rect width="5" height="5" fill="white"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#e0e0e0" stroke-width="0.4"/>
    </pattern>
    <!-- Cross hatch for cable conduits -->
    <pattern id="cable-hatch" patternUnits="userSpaceOnUse" width="5" height="5">
      <rect width="5" height="5" fill="white"/>
      <line x1="0" y1="0" x2="5" y2="5" stroke="#dbb" stroke-width="0.3"/>
      <line x1="5" y1="0" x2="0" y2="5" stroke="#dbb" stroke-width="0.3"/>
    </pattern>
  </defs>


  <!-- ==================== SOLID PLATE (everything starts solid) ==================== -->
  <rect x="0" y="0" width="355.7" height="248.1" rx="7.25" ry="7.25" class="solid"/>

  <g clip-path="url(#plate-clip)">

    <!-- ==================== COMPONENT CUTOUTS (white) ==================== -->

    <rect x="30" y="93.05" width="62" height="62" rx="2" class="component"/>
    <text x="51" y="122" class="label">HUB</text>
    <text x="51" y="127" class="label-small">62x62</text>

    <rect x="97" y="55" width="87" height="59" rx="2" class="component"/>
    <text x="140.5" y="84" class="label">SSD 1</text>

    <rect x="240" y="30" width="87" height="59" rx="2" class="component"/>
    <text x="287.5" y="64" class="label">SSD 2</text>

    <rect x="97" y="134" width="87" height="59" rx="2" class="component"/>
    <text x="140.5" y="163" class="label">SSD 3</text>

    <rect x="240" y="158" width="87" height="59" rx="2" class="component"/>
    <text x="287.5" y="183" class="label">SSD 4</text>

    <!-- ==================== CABLE CONDUITS (white cross-hatch) ==================== -->

    <!-- Hub cable exit -->
    <rect x="0" y="124" width="30" height="5" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>

    <!-- Top horizontal corridor inside frame (y 30-48) -->
    <rect x="38" y="30" width="180" height="18" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>

    <!-- Left vertical north (hub to top corridor) -->
    <rect x="38" y="30" width="50" height="63" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>

    <!-- Center vertical north (top corridor to SSD connectors) -->
    <rect x="190" y="30" width="28" height="58" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>

    <!-- SSD2 connector link -->
    <rect x="218" y="40" width="22" height="45" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>

    <!-- Bottom horizontal corridor inside frame (y 200-218) -->
    <rect x="38" y="200" width="180" height="18" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>

    <!-- Left vertical south (hub to bottom corridor) -->
    <rect x="38" y="155" width="50" height="63" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>

    <!-- Center vertical south (bottom corridor to SSD connectors) -->
    <rect x="190" y="160" width="28" height="58" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>

    <!-- SSD4 connector link -->
    <rect x="218" y="163" width="22" height="48" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>


    <!-- ==================== VELCRO HOLES (layer 3 only) ==================== -->
    <circle cx="8" cy="20" r="5" class="velcro-hole"/>
    <circle cx="8" cy="60" r="5" class="velcro-hole"/>
    <circle cx="8" cy="188.1" r="5" class="velcro-hole"/>
    <circle cx="8" cy="228.1" r="5" class="velcro-hole"/>
    <circle cx="347.7" cy="20" r="5" class="velcro-hole"/>
    <circle cx="347.7" cy="60" r="5" class="velcro-hole"/>
    <circle cx="347.7" cy="188.1" r="5" class="velcro-hole"/>
    <circle cx="347.7" cy="228.1" r="5" class="velcro-hole"/>
    <circle cx="20" cy="8" r="5" class="velcro-hole"/>
    <circle cx="60" cy="8" r="5" class="velcro-hole"/>
    <circle cx="295.7" cy="8" r="5" class="velcro-hole"/>
    <circle cx="335.7" cy="8" r="5" class="velcro-hole"/>
    <circle cx="20" cy="240.1" r="5" class="velcro-hole"/>
    <circle cx="60" cy="240.1" r="5" class="velcro-hole"/>
    <circle cx="295.7" cy="240.1" r="5" class="velcro-hole"/>
    <circle cx="335.7" cy="240.1" r="5" class="velcro-hole"/>

  </g>

  <!-- ==================== 10mm GRID OVERLAY ==================== -->
  <g opacity="0.3">
    <!-- Vertical grid lines every 10mm -->
    <line x1="0" y1="0" x2="0" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="10" y1="0" x2="10" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="20" y1="0" x2="20" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="30" y1="0" x2="30" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="40" y1="0" x2="40" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="50" y1="0" x2="50" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="60" y1="0" x2="60" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="70" y1="0" x2="70" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="80" y1="0" x2="80" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="90" y1="0" x2="90" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="100" y1="0" x2="100" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="110" y1="0" x2="110" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="120" y1="0" x2="120" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="130" y1="0" x2="130" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="140" y1="0" x2="140" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="150" y1="0" x2="150" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="160" y1="0" x2="160" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="170" y1="0" x2="170" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="180" y1="0" x2="180" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="190" y1="0" x2="190" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="200" y1="0" x2="200" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="210" y1="0" x2="210" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="220" y1="0" x2="220" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="230" y1="0" x2="230" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="240" y1="0" x2="240" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="250" y1="0" x2="250" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="260" y1="0" x2="260" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="270" y1="0" x2="270" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="280" y1="0" x2="280" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="290" y1="0" x2="290" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="300" y1="0" x2="300" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="310" y1="0" x2="310" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="320" y1="0" x2="320" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="330" y1="0" x2="330" y2="248.1" stroke="#446" stroke-width="0.2"/>
    <line x1="340" y1="0" x2="340" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <line x1="350" y1="0" x2="350" y2="248.1" stroke="#446" stroke-width="0.15"/>
    <!-- Horizontal grid lines every 10mm -->
    <line x1="0" y1="0" x2="355.7" y2="0" stroke="#446" stroke-width="0.2"/>
    <line x1="0" y1="10" x2="355.7" y2="10" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="20" x2="355.7" y2="20" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="30" x2="355.7" y2="30" stroke="#446" stroke-width="0.2"/>
    <line x1="0" y1="40" x2="355.7" y2="40" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="50" x2="355.7" y2="50" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="60" x2="355.7" y2="60" stroke="#446" stroke-width="0.2"/>
    <line x1="0" y1="70" x2="355.7" y2="70" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="80" x2="355.7" y2="80" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="90" x2="355.7" y2="90" stroke="#446" stroke-width="0.2"/>
    <line x1="0" y1="100" x2="355.7" y2="100" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="110" x2="355.7" y2="110" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="120" x2="355.7" y2="120" stroke="#446" stroke-width="0.2"/>
    <line x1="0" y1="130" x2="355.7" y2="130" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="140" x2="355.7" y2="140" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="150" x2="355.7" y2="150" stroke="#446" stroke-width="0.2"/>
    <line x1="0" y1="160" x2="355.7" y2="160" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="170" x2="355.7" y2="170" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="180" x2="355.7" y2="180" stroke="#446" stroke-width="0.2"/>
    <line x1="0" y1="190" x2="355.7" y2="190" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="200" x2="355.7" y2="200" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="210" x2="355.7" y2="210" stroke="#446" stroke-width="0.2"/>
    <line x1="0" y1="220" x2="355.7" y2="220" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="230" x2="355.7" y2="230" stroke="#446" stroke-width="0.15"/>
    <line x1="0" y1="240" x2="355.7" y2="240" stroke="#446" stroke-width="0.2"/>
  </g>
  <!-- Grid labels: X axis (top, every 30mm = 3cm) -->
  <text x="0" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">0</text>
  <text x="30" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">30</text>
  <text x="60" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">60</text>
  <text x="90" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">90</text>
  <text x="120" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">120</text>
  <text x="150" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">150</text>
  <text x="180" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">180</text>
  <text x="210" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">210</text>
  <text x="240" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">240</text>
  <text x="270" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">270</text>
  <text x="300" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">300</text>
  <text x="330" y="-3" font-family="sans-serif" font-size="3" fill="#446" text-anchor="middle">330</text>
  <!-- Grid labels: Y axis (left, every 30mm = 3cm) -->
  <text x="-3" y="2" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">0</text>
  <text x="-3" y="32" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">30</text>
  <text x="-3" y="62" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">60</text>
  <text x="-3" y="92" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">90</text>
  <text x="-3" y="122" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">120</text>
  <text x="-3" y="152" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">150</text>
  <text x="-3" y="182" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">180</text>
  <text x="-3" y="212" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">210</text>
  <text x="-3" y="242" font-family="sans-serif" font-size="3" fill="#446" text-anchor="end">240</text>

  <!-- 30mm frame indicator -->
  <rect x="30" y="30" width="295.7" height="188.1" rx="3" ry="3" fill="none" stroke="#864" stroke-width="0.4" stroke-dasharray="3,2"/>
  <text x="32" y="28" class="frame-dim">30mm frame inner edge</text>

  <!-- Title -->
  <text x="177.85" y="16" class="title" text-anchor="middle">MacSoccle — Mesh Design (Layer 2/3)</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="5" y="252" width="10" height="6" rx="1" class="solid" stroke="#333" stroke-width="0.3"/>
  <text x="18" y="257" class="label-small" text-anchor="start">Solid bamboo (ribs, frame)</text>

  <rect x="100" y="252" width="10" height="6" rx="1" fill="white" stroke="#666" stroke-width="0.4"/>
  <text x="113" y="257" class="label-small" text-anchor="start">Component cutout</text>

  <rect x="185" y="252" width="10" height="6" rx="1" fill="url(#cable-hatch)" stroke="#c99" stroke-width="0.3"/>
  <text x="198" y="257" class="label-small" text-anchor="start">Cable conduit</text>

  <rect x="260" y="252" width="10" height="6" rx="1" fill="url(#mesh-hatch)" stroke="#bbb" stroke-width="0.3"/>
  <text x="273" y="257" class="label-small" text-anchor="start">Mesh void</text>

  <circle cx="330" cy="255" r="3" class="velcro-hole"/>
  <text x="336" y="257" class="label-small" text-anchor="start">Velcro (L3)</text>

</svg>
